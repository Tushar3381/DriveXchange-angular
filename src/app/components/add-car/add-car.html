<section class="form-page">
  <div class="form-card">
    <div class="form-head">
      <div>
        <p class="eyebrow">Create listing</p>
        <h2>Add a new car</h2>
        <p>Fill in the essentials clearly so the inventory stays consistent and easy to trust.</p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" enctype="multipart/form-data" class="car-form">
      <div class="form-grid">
        <label class="field">
          <span>Car ID</span>
          <input type="number" id="id" name="id" [(ngModel)]="car.id" required />
        </label>

        <label class="field">
          <span>Brand</span>
          <input type="text" id="brand" name="brand" [(ngModel)]="car.brand" required />
        </label>

        <label class="field">
          <span>Model</span>
          <input type="text" id="model" name="model" [(ngModel)]="car.model" required />
        </label>

        <label class="field">
          <span>Color</span>
          <input type="text" id="color" name="color" [(ngModel)]="car.color" required />
        </label>

        <label class="field field--full">
          <span>Price</span>
          <input type="number" id="price" name="price" [(ngModel)]="car.price" required />
        </label>

        <label class="field field--full">
          <span>Description</span>
          <textarea id="description" name="description" rows="4" [(ngModel)]="car.description"></textarea>
        </label>

        <label class="field field--full">
          <span>Car image</span>
          <input type="file" id="image" accept="image/*" (change)="onFileSelected($event)" />
          <small>{{ selectedFileName || 'Upload a clean image to improve listing quality.' }}</small>
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="primary-btn">Add car</button>
      </div>
    </form>

    <p *ngIf="successMsg" class="form-message" [class.is-error]="messageType === 'error'">
      {{ successMsg }}
    </p>
  </div>
</section>
