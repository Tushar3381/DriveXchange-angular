<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-indigo-600 to-blue-500 px-4">
  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Reset Password
    </h2>

    <form (ngSubmit)="resetPassword()" class="space-y-4">

      <input type="email"
        placeholder="Enter your registered email"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
        [(ngModel)]="email"
        name="email">

      <div *ngIf="message" class="text-green-600 text-center">
        {{ message }}
      </div>

      <div *ngIf="errorMessage" class="text-red-600 text-center">
        {{ errorMessage }}
      </div>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
        Send Reset Link
      </button>

    </form>

  </div>
</div>
