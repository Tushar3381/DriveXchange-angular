<section class="used-detail-shell" *ngIf="car">
  <article class="gallery-card">
    <div class="main-image">
      <img [src]="getActiveImage()" alt="Used car image" />
    </div>

    <div class="thumb-grid">
      <button type="button" *ngFor="let img of images" (click)="selectImage(img)">
        <img [src]="getImageUrl(img)" alt="Thumbnail" />
      </button>
    </div>
  </article>

  <article class="info-card">
    <p class="eyebrow">Used Car Details</p>
    <h1>{{ car.brand }} {{ car.model }}</h1>
    <p class="price">₹{{ car.price | number }}</p>

    <div class="info-grid">
      <div><span>Year</span><strong>{{ car.year }}</strong></div>
      <div><span>Fuel Type</span><strong>{{ car.fuelType }}</strong></div>
      <div><span>Owner</span><strong>{{ car.ownerName }}</strong></div>
      <div><span>Contact</span><strong>{{ car.contactNumber }}</strong></div>
    </div>

    <section class="description">
      <h2>Description</h2>
      <p>{{ car.description || 'No description available.' }}</p>
    </section>

    <a class="contact-btn" [href]="'tel:' + car.contactNumber">Contact Seller</a>
  </article>
</section>
