<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-600 px-4">
  <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
      Welcome Back
    </h2>

    <form (ngSubmit)="login()" class="space-y-5">

      <!-- Email -->
      <div>
        <input 
          type="email"
          placeholder="Email Address"
          class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="email"
          name="email"
        />

        <small *ngIf="submitted && !email" class="text-red-500">
          Email is required
        </small>
      </div>

      <!-- Password with Toggle -->
      <div class="relative">
        <input 
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          class="w-full px-4 py-3 border rounded-xl pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="password"
          name="password"
        />

        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute right-4 top-3 text-gray-500 hover:text-blue-600 text-lg">
          {{ showPassword ? '🙈' : '👁' }}
        </button>

        <small *ngIf="submitted && !password" class="text-red-500">
          Password is required
        </small>
      </div>







      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-red-600 text-center font-medium">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button 
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition disabled:bg-gray-400">
        
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

<div class="text-right">
  <a routerLink="/User/forgot-password"
     class="text-sm text-blue-600 hover:underline">
    Forgot Password?
  </a>
</div>





      <!-- Redirect -->
      <p class="text-center mt-4 text-gray-600">
        Don't have an account?
        <a routerLink="/User/register" class="text-blue-600 font-semibold hover:underline">
          Register
        </a>
      </p>

    </form>

  </div>
</div>
