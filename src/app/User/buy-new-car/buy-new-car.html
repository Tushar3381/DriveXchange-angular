<div class="container py-5">

  <!-- Page Header -->
  <div class="text-center mb-5">
    <h2 class="fw-bold">Buy New Cars</h2>
    <p class="text-muted">
      Explore the latest brand-new cars available for purchase
    </p>
  </div>

  <div class="row g-4">

    <div class="col-xl-3 col-lg-4 col-md-6"
         *ngFor="let car of cars">

      <div class="card car-card h-100 border-0">

        <!-- Car Image -->
        <div class="image-wrapper">
          <img
            class="card-img-top"
            [src]="'http://localhost:8080/uploads/' + car.imageUrl"
            alt="Car Image">
        </div>

        <!-- Card Body -->
        <div class="card-body d-flex flex-column">

          <h5 class="card-title fw-semibold mb-2">
            {{ car.brand }} {{ car.model }}
          </h5>

          <p class="price-text mb-3">
            ₹{{ car.price | number }}
          </p>

          <button class="btn btn-primary mt-auto"
                  (click)="viewDetails(car.id)">
            View Details
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
