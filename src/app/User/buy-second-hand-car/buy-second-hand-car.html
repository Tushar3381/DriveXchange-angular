<div class="container mt-4">

  <h2 class="text-center mb-4">Buy Second Hand Cars</h2>

  <div class="row">

    <div class="col-md-4 mb-4" *ngFor="let car of cars">

      <div class="card shadow h-100">

        <img
          class="card-img-top"
          [src]="getFirstImage(car.images)"
          height="200"
          style="object-fit: cover;"
        />

        <div class="card-body">

          <h5 class="card-title">
            {{ car.brand }} {{ car.model }}
          </h5>

          <p class="card-text">
            <strong>Year:</strong> {{ car.year }} <br>
            <strong>Fuel:</strong> {{ car.fuelType }} <br>
            <strong>Price:</strong> ₹{{ car.price }}
          </p>

          <button class="btn btn-success w-100"
                  (click)="viewDetails(car.id)">
            View Details
          </button>

        </div>
      </div>

    </div>

  </div>

</div>
