<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 to-indigo-600 px-4">
  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
      Create Account
    </h2>

    <form (ngSubmit)="register()" class="space-y-4">

      <!-- Name -->
      <div>
        <input type="text"
          placeholder="Full Name"
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="name" name="name">
        <small *ngIf="submitted && !name" class="text-red-500">Name is required</small>
      </div>

      <!-- Email -->
      <div>
        <input type="email"
          placeholder="Email Address"
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="email" name="email">
        <small *ngIf="submitted && !email" class="text-red-500">Email is required</small>
      </div>

      <!-- Contact -->
      <div>
        <input type="text"
          placeholder="Contact Number"
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="contactnumber" name="contactnumber">
        <small *ngIf="submitted && !contactnumber" class="text-red-500">
          Contact number is required
        </small>
      </div>

      <!-- Gender -->
      <div>
        <label class="block text-gray-700 font-medium mb-1">Gender</label>
        <div class="flex gap-4">
          <label><input type="radio" value="Male" [(ngModel)]="gender" name="gender"> Male</label>
          <label><input type="radio" value="Female" [(ngModel)]="gender" name="gender"> Female</label>
          <label><input type="radio" value="Other" [(ngModel)]="gender" name="gender"> Other</label>
        </div>
        <small *ngIf="submitted && !gender" class="text-red-500">Gender is required</small>
      </div>

      <!-- Password -->
     <div class="relative">
  <input
    [type]="showPassword ? 'text' : 'password'"
    placeholder="Password"
    class="w-full border rounded-lg px-4 py-2 pr-12 focus:ring-2 focus:ring-blue-500"
    [(ngModel)]="password"
    name="password">

  <button
    type="button"
    (click)="showPassword = !showPassword"
    class="absolute right-3 top-2.5 text-gray-500 hover:text-blue-600 text-lg">
    {{ showPassword ? '🙈' : '👁' }}
  </button>

  <small *ngIf="submitted && !password" class="text-red-500">
    Password is required
  </small>
</div>

      <!-- Confirm Password -->
<div class="relative">
  <input
    [type]="showConfirmPassword ? 'text' : 'password'"
    placeholder="Confirm Password"
    class="w-full border rounded-lg px-4 py-2 pr-12 focus:ring-2 focus:ring-blue-500"
    [(ngModel)]="confirmPassword"
    name="confirmPassword">

  <button
    type="button"
    (click)="showConfirmPassword = !showConfirmPassword"
    class="absolute right-3 top-2.5 text-gray-500 hover:text-blue-600 text-lg">
    {{ showConfirmPassword ? '🙈' : '👁' }}
  </button>

  <small *ngIf="submitted && !confirmPassword" class="text-red-500">
    Confirm password is required
  </small>
</div>


      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-red-600 text-center font-medium">
        {{ errorMessage }}
      </div>

      <!-- Success Message -->
      <div *ngIf="message" class="text-green-600 text-center font-medium">
        {{ message }}
      </div>

      <!-- Button -->
      <button type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg text-lg font-semibold 
               hover:bg-blue-700 transition disabled:bg-gray-400">

        {{ loading ? 'Registering...' : 'Register' }}
      </button>

    </form>

    <p class="text-center mt-4 text-gray-600">
      Already have an account?
      <a routerLink="/User/login" class="text-blue-600 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>
</div>
