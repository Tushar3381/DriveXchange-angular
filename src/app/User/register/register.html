<section class="reg-shell">
  <div class="reg-card">
    <header class="reg-header">
      <p>Create DriveXchange Profile</p>
      <h1>Start your car buying and selling journey.</h1>
    </header>

    <form (ngSubmit)="register()">
      <div class="grid-two">
        <div>
          <label for="name">Full Name</label>
          <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Your name" />
          <small *ngIf="submitted && !name" class="field-error">Name is required.</small>
        </div>

        <div>
          <label for="email">Email Address</label>
          <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
          <small *ngIf="submitted && !email" class="field-error">Email is required.</small>
        </div>
      </div>

      <div class="grid-two">
        <div>
          <label for="contact">Contact Number</label>
          <input
            id="contact"
            type="text"
            [(ngModel)]="contactnumber"
            name="contactnumber"
            placeholder="10-digit mobile number"
          />
          <small *ngIf="submitted && !contactnumber" class="field-error">Contact number is required.</small>
        </div>

        <div>
          <label for="gender">Gender</label>
          <select id="gender" [(ngModel)]="gender" name="gender">
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <small *ngIf="submitted && !gender" class="field-error">Gender is required.</small>
        </div>
      </div>

      <div class="grid-two">
        <div>
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="At least 6 characters"
            />
            <button type="button" (click)="showPassword = !showPassword">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <small *ngIf="submitted && !password" class="field-error">Password is required.</small>
        </div>

        <div>
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input
              id="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
            />
            <button type="button" (click)="showConfirmPassword = !showConfirmPassword">
              {{ showConfirmPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <small *ngIf="submitted && !confirmPassword" class="field-error">Confirmation is required.</small>
        </div>
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="ok-msg" *ngIf="message">{{ message }}</p>

      <button class="submit-btn" type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="bottom-line">
      Already have an account?
      <a routerLink="/User/login">Login</a>
    </p>
  </div>
</section>
