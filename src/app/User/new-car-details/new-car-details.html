<section class="detail-shell" *ngIf="car">
  <article class="detail-media">
    <img [src]="uploadsBase + '/' + car.imageUrl" alt="Car image" />
  </article>

  <article class="detail-content">
    <p class="eyebrow">New Car Details</p>
    <h1>{{ car.brand }} {{ car.model }}</h1>
    <p class="price">₹{{ car.price | number }}</p>

    <div class="meta-grid">
      <div>
        <span>Color</span>
        <strong>{{ car.color || 'Not specified' }}</strong>
      </div>
      <div>
        <span>Availability</span>
        <strong>In Stock</strong>
      </div>
    </div>

    <section class="description">
      <h2>Overview</h2>
      <p>{{ car.description || 'No description available.' }}</p>
    </section>

    <div class="actions">
      <button class="btn-outline" type="button" (click)="goToTestDrive()">Book Test Drive</button>
      <button class="btn-fill" type="button" (click)="buyCar()">Buy Now</button>
    </div>
  </article>
</section>
