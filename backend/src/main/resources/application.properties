spring.application.name=DriveXchangeAdmin
spring.config.import=optional:classpath:application-email.example.properties,optional:classpath:application-email.properties




spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/adminpannel}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Password@12}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update



spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

app.jwt.secret=${APP_JWT_SECRET:mynameistushartatheiamfromshrirampuriamnowfresherandiamlookingforthejobtosecuremyfuturegoodafternoonhowareyou2601}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.admin.setup-key=${APP_ADMIN_SETUP_KEY:}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}
app.mail.from-name=${APP_MAIL_FROM_NAME:DriveXchange Support}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.uploads-dir=${APP_UPLOADS_DIR:uploads}
app.car-uploads-dir=${APP_CAR_UPLOADS_DIR:car-uploads}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}
app.reset.debug-expose-link=${APP_RESET_DEBUG_EXPOSE_LINK:false}
