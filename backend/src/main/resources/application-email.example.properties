# Local mail configuration for password reset delivery.
# These values are now read by Spring Boot at startup.
#
# Gmail example:
# 1. Enable 2-step verification on the sender Gmail account.
# 2. Create an App Password in Google Account security settings.
# 3. Use that App Password below instead of your normal Gmail password.

app.frontend.base-url=http://localhost:4200
app.mail.from-name=DriveXchange Support

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-character-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Keep this false in normal use so reset links are emailed instead of shown on screen.
app.reset.debug-expose-link=false
